name: Build HTML Project to APK

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project and Copy All Assets
        run: |
          cordova create MojaApka com.fobywatel.app fObywatel
          rm -rf MojaApka/www/*
          rsync -av --exclude="MojaApka" --exclude=".git" --exclude=".github" ./ MojaApka/www/

      - name: Add Android Platform and Build (Debug)
        run: |
          cd MojaApka
          cordova platform add android
          cordova build android --debug

      - name: Prepare Smart Download Page
        run: |
          mkdir public
          cp MojaApka/platforms/android/app/build/outputs/apk/debug/app-debug.apk public/fObywatel.apk
          
          echo '<!DOCTYPE html><html><head><title>Instalator fObywatel</title><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">' > public/index.html
          echo '<style>body { background: #121212; color: white; text-align: center; font-family: sans-serif; padding-top: 10vh; } .btn { display: inline-block; font-size: 20px; color: white; background: #007bff; padding: 15px 40px; text-decoration: none; border-radius: 10px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,123,255,0.4); transition: 0.2s; } .btn:active { transform: scale(0.95); }</style></head>' >> public/index.html
          echo '<body>' >> public/index.html
          echo '  <img src="https://img.icons8.com/fluent/96/000000/shield.png" style="margin-bottom:20px;"><br>' >> public/index.html
          echo '  <h1>Instalator fObywatel</h1>' >> public/index.html
          echo '  <p style="color:#aaa; margin-bottom:40px;">Kliknij poniżej, aby pobrać i automatycznie uruchomić instalację aplikacji.</p>' >> public/index.html
          echo '  <a href="fObywatel.apk" download="fObywatel.apk" type="application/vnd.android.package-archive" class="btn">ZAINSTALUJ APLIKACJĘ</a>' >> public/index.html
          echo '</body></html>' >> public/index.html

      - name: Upload and Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
